services:
  db:
    image: timescale/timescaledb-ha:pg14-latest
    container_name: db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-market_data}
    volumes:
      - db-volume:/home/postgres/pgdata/data
    ports:
      - 5432:5432
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-market_data}",
        ]
      # Backend and migrations wait on DB health so cold starts don't race Postgres.
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev-git
      secrets:
        - source: github_token
          mode: 0600
    image: market-data:migrate
    container_name: migrate
    # Run schema setup once per compose startup; backend won't start unless this succeeds.
    command: piccolo migrations forwards market_data_piccolo --trace
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Inside compose, services talk to the DB over the service name, not localhost.
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-market_data}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
    volumes:
      - .:/app
      # Uncomment to make the migration container import the sibling
      # `market-data-library/` checkout instead of the git-pinned package that
      # was installed into the image during `poetry install`.
      # - ../market-data-library:/app/market-data-library-local:ro
    # Uncomment this together with the bind mount above to mirror
    # `bash scripts/use_local_market_data_library.sh` inside Docker:
    # environment:
    #   PYTHONPATH: "/app/market-data-library-local:/app"
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev-git
      secrets:
        - source: github_token
          mode: 0600
    image: market-data:dev-git
    container_name: backend
    command: uvicorn --reload --app-dir src/server --host 0.0.0.0 main:app
    depends_on:
      db:
        condition: service_healthy
      migrate:
        # Fail fast if migrations don't apply cleanly.
        condition: service_completed_successfully
    environment:
      # Inside compose, services talk to the DB over the service name, not localhost.
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-market_data}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
    volumes:
      - .:/app
      # Uncomment to make the backend container import the sibling
      # `market-data-library/` checkout instead of the git-pinned package that
      # was installed into the image during `poetry install`.
      # - ../market-data-library:/app/market-data-library-local:ro
    # Uncomment this together with the bind mount above to mirror
    # `bash scripts/use_local_market_data_library.sh` inside Docker:
    # environment:
    #   PYTHONPATH: "/app/market-data-library-local:/app"
    ports:
      - 8000:8000

volumes:
  db-volume:

secrets:
  github_token:
    file: secret/github_token
